<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Ícones SVG
        const IconWrench = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
        const IconEdit = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconDownload = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconBack = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [view, setView] = useState('list');
            const [isUploading, setIsUploading] = useState(false);
            const [isEditingHeader, setIsEditingHeader] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (!u) signInAnonymously(auth).catch(console.error);
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                return onSnapshot(collection(db, 'orders'), (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    const sorted = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    setOrders(sorted);
                    if (selectedOrder) {
                        const up = sorted.find(o => o.id === selectedOrder.id);
                        if (up) setSelectedOrder(up);
                    }
                });
            }, [user, selectedOrder?.id]);

            const updateOrderField = async (field, value) => {
                if (!selectedOrder) return;
                try {
                    await updateDoc(doc(db, 'orders', selectedOrder.id), { [field]: value });
                } catch (e) { console.error(e); }
            };

            const handleUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length || !selectedOrder) return;
                setIsUploading(true);
                try {
                    const orderRef = doc(db, 'orders', selectedOrder.id);
                    const newPhotos = [];
                    for (const file of files) {
                        const compressed = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.readAsDataURL(file);
                            reader.onload = (ev) => {
                                const img = new Image();
                                img.src = ev.target.result;
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    const MAX = 600;
                                    let w = img.width, h = img.height;
                                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                                    else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                                    canvas.width = w; canvas.height = h;
                                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                                };
                            };
                        });
                        newPhotos.push({ id: Math.random().toString(36).substr(2, 9), url: compressed, description: "" });
                    }
                    const docSnap = await getDoc(orderRef);
                    const currentPhotos = docSnap.exists() ? (docSnap.data().photos || []) : [];
                    await updateDoc(orderRef, { photos: [...currentPhotos, ...newPhotos] });
                } catch (err) { alert("Erro no upload."); }
                finally { 
                    setIsUploading(false); 
                    if (fileInputRef.current) fileInputRef.current.value = "";
                }
            };

            if (!user) return <div className="h-screen flex items-center justify-center font-bold text-blue-600 uppercase text-[10px] tracking-widest">Iniciando...</div>;

            return (
                <div className="min-h-screen pb-10 bg-gray-50">
                    <header className="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2 font-bold text-sm tracking-tight"><IconWrench /> OFICINA DIGITAL</div>
                        {view !== 'list' && (
                            <button onClick={() => { setView('list'); setIsEditingHeader(false); }} className="p-2 bg-slate-800 rounded-lg"><IconBack /></button>
                        )}
                    </header>

                    <main className="p-4 max-w-xl mx-auto">
                        {view === 'list' ? (
                            <div className="space-y-3">
                                <button onClick={() => setView('create')} className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-md uppercase text-xs tracking-widest active:scale-95 transition-transform">+ Abrir Nova O.S.</button>
                                {orders.map(o => (
                                    <div key={o.id} onClick={() => { setSelectedOrder(o); setView('detail'); }} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center active:bg-slate-50 transition-colors">
                                        <div className="flex-1 overflow-hidden">
                                            <div className="text-blue-600 font-bold text-[10px]">OS #{o.osNumber}</div>
                                            <div className="font-bold text-slate-800 uppercase text-sm truncate">{o.client}</div>
                                            <div className="text-[10px] text-slate-400 font-bold uppercase">{o.materials || "Sem material"}</div>
                                        </div>
                                        <div className="text-slate-300 ml-2"><IconBack /></div>
                                    </div>
                                ))}
                            </div>
                        ) : view === 'create' ? (
                            <form className="bg-white p-6 rounded-2xl shadow-xl space-y-4 border border-slate-100" onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                await addDoc(collection(db, 'orders'), {
                                    osNumber: fd.get('os'), 
                                    client: fd.get('client'),
                                    materials: fd.get('material'), // Salva o material na criação
                                    serviceNotes: "", 
                                    createdAt: new Date().toISOString(), 
                                    photos: []
                                });
                                setView('list');
                            }}>
                                <h2 className="text-lg font-bold border-b pb-2">Nova O.S.</h2>
                                <input name="os" placeholder="Nº da Ordem" className="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-xl outline-none focus:border-blue-500 font-bold" required />
                                <input name="client" placeholder="Nome do Cliente" className="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-xl outline-none focus:border-blue-500 font-bold" required />
                                <input name="material" placeholder="Material (Ex: Motor, Placa, Tv)" className="w-full border-2 border-slate-50 bg-slate-50 p-4 rounded-xl outline-none focus:border-blue-500 font-bold" required />
                                <button className="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold uppercase text-xs tracking-widest mt-2 active:bg-black transition-all">Criar Registro</button>
                            </form>
                        ) : (
                            <div className="space-y-4">
                                {/* CABEÇALHO COM PROTEÇÃO CONTRA UNDEFINED */}
                                <div className="bg-white p-5 rounded-2xl shadow-md border-l-4 border-blue-600 relative overflow-hidden">
                                    {isEditingHeader ? (
                                        <div className="space-y-3">
                                            <input className="w-full border p-2 rounded font-bold uppercase" value={selectedOrder.client || ""} onChange={(e) => updateOrderField("client", e.target.value)} placeholder="Cliente" />
                                            <input className="w-full border p-2 rounded text-blue-600 font-bold" value={selectedOrder.osNumber || ""} onChange={(e) => updateOrderField("osNumber", e.target.value)} placeholder="Nº O.S." />
                                            <input className="w-full border p-2 rounded text-slate-500 font-bold text-xs" value={selectedOrder.materials || ""} onChange={(e) => updateOrderField("materials", e.target.value)} placeholder="Material" />
                                            <button onClick={() => setIsEditingHeader(false)} className="bg-green-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold">SALVAR ALTERAÇÕES</button>
                                        </div>
                                    ) : (
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h2 className="text-2xl font-black text-slate-800 uppercase leading-none break-words">{selectedOrder.client || "Cliente"}</h2>
                                                <p className="text-blue-600 font-bold text-xs mt-2 uppercase">OS #{selectedOrder.osNumber || "000"}</p>
                                                <p className="text-slate-400 font-bold text-[10px] uppercase mt-1">MATERIAL: {selectedOrder.materials || "NÃO INFORMADO"}</p>
                                            </div>
                                            <div className="flex gap-1">
                                                <button onClick={() => setIsEditingHeader(true)} className="text-slate-300 p-2 active:text-blue-500"><IconEdit /></button>
                                                <button onClick={() => { if(confirm("Apagar O.S.?")) { deleteDoc(doc(db, 'orders', selectedOrder.id)); setView('list'); } }} className="text-slate-300 p-2 active:text-red-500"><IconTrash /></button>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* DESCRIÇÃO DO SERVIÇO */}
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-2">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Relatório Técnico</label>
                                    <textarea 
                                        className="w-full border-0 bg-slate-50 p-4 rounded-xl text-sm outline-none min-h-[120px] font-medium text-slate-700"
                                        placeholder="O que está sendo feito?"
                                        value={selectedOrder.serviceNotes || ""}
                                        onChange={(e) => updateOrderField("serviceNotes", e.target.value)}
                                    />
                                </div>

                                {/* GALERIA */}
                                <div className="flex justify-between items-center bg-slate-200/50 p-2 rounded-xl sticky top-16 z-40 backdrop-blur-md">
                                    <div className="flex gap-2">
                                        <button disabled={isUploading} onClick={() => fileInputRef.current.click()} className="bg-blue-600 text-white px-4 py-2.5 rounded-lg font-bold text-[10px] flex items-center gap-2 uppercase">
                                            <IconWrench /> {isUploading ? "..." : "FOTO"}
                                        </button>
                                        {selectedOrder.photos?.length > 0 && (
                                            <button onClick={() => { selectedOrder.photos.forEach(p => { const a = document.createElement('a'); a.href = p.url; a.download = 'foto.jpg'; a.click(); }); }} className="bg-slate-700 text-white px-4 py-2.5 rounded-lg font-bold text-[10px] flex items-center gap-2 uppercase tracking-tighter">
                                                <IconDownload /> BAIXAR TUDO
                                            </button>
                                        )}
                                    </div>
                                    <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleUpload} />
                                </div>

                                <div className="grid gap-5">
                                    {(selectedOrder.photos || []).map(p => (
                                        <div key={p.id} className="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100">
                                            <img src={p.url} className="w-full h-auto bg-slate-200" loading="lazy" />
                                            <div className="p-4 flex items-center gap-3">
                                                <input className="w-full text-xs font-bold text-slate-600 outline-none bg-slate-50 p-2 rounded-lg" placeholder="Legenda..." value={p.description || ""} onChange={(e) => {
                                                    const up = selectedOrder.photos.map(ph => ph.id === p.id ? {...ph, description: e.target.value} : ph);
                                                    updateDoc(doc(db, 'orders', selectedOrder.id), { photos: up });
                                                }} />
                                                <div className="flex gap-2">
                                                    <a href={p.url} download="foto.jpg" className="text-blue-500 p-2 bg-blue-50 rounded-full"><IconDownload /></a>
                                                    <button onClick={async () => { if(confirm("Apagar foto?")) { const up = selectedOrder.photos.filter(ph => ph.id !== p.id); await updateDoc(doc(db, 'orders', selectedOrder.id), { photos: up }); } }} className="text-red-400 p-2 bg-red-50 rounded-full"><IconTrash /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
