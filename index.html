<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Ícones SVG
        const IconWrench = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconBack = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [view, setView] = useState('list');
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (!u) signInAnonymously(auth).catch(console.error);
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                return onSnapshot(collection(db, 'orders'), (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    const sorted = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    setOrders(sorted);
                    if (selectedOrder) {
                        const up = sorted.find(o => o.id === selectedOrder.id);
                        if (up) setSelectedOrder(up);
                    }
                });
            }, [user, selectedOrder?.id]);

            const deleteOrder = async (id) => {
                if (window.confirm("Deseja apagar esta O.S. completa e todas as fotos?")) {
                    await deleteDoc(doc(db, 'orders', id));
                    setView('list');
                }
            };

            const deletePhoto = async (photoId) => {
                if (window.confirm("Apagar esta foto?")) {
                    const updatedPhotos = selectedOrder.photos.filter(p => p.id !== photoId);
                    await updateDoc(doc(db, 'orders', selectedOrder.id), { photos: updatedPhotos });
                }
            };

            const downloadAllPhotos = () => {
                if (!selectedOrder.photos || selectedOrder.photos.length === 0) return;
                selectedOrder.photos.forEach((p, index) => {
                    const link = document.createElement('a');
                    link.href = p.url;
                    link.download = `OS-${selectedOrder.osNumber}-foto-${index + 1}.jpg`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                });
            };

            const updateOrderField = async (field, value) => {
                try {
                    await updateDoc(doc(db, 'orders', selectedOrder.id), { [field]: value });
                } catch (e) { console.error(e); }
            };

            const handleUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                setIsUploading(true);
                try {
                    const orderRef = doc(db, 'orders', selectedOrder.id);
                    const newPhotos = [];
                    for (const file of files) {
                        const compressed = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.readAsDataURL(file);
                            reader.onload = (ev) => {
                                const img = new Image();
                                img.src = ev.target.result;
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    const MAX = 600;
                                    let w = img.width, h = img.height;
                                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                                    else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                                    canvas.width = w; canvas.height = h;
                                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                                };
                            };
                        });
                        newPhotos.push({ id: Math.random().toString(36).substr(2, 9), url: compressed, description: "" });
                    }
                    const docSnap = await getDoc(orderRef);
                    const currentPhotos = docSnap.exists() ? (docSnap.data().photos || []) : [];
                    await updateDoc(orderRef, { photos: [...currentPhotos, ...newPhotos] });
                } catch (err) { alert("Erro ao salvar."); }
                finally { 
                    setIsUploading(false); 
                    if (fileInputRef.current) fileInputRef.current.value = "";
                }
            };

            if (!user) return <div className="h-screen flex items-center justify-center font-bold text-blue-600 uppercase text-xs">Conectando...</div>;

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2 font-bold text-sm tracking-tight"><IconWrench /> OFICINA DIGITAL</div>
                        {view !== 'list' && (
                            <button onClick={() => setView('list')} className="p-2 bg-slate-800 rounded-lg"><IconBack /></button>
                        )}
                    </header>

                    <main className="p-4 max-w-xl mx-auto">
                        {view === 'list' ? (
                            <div className="space-y-3">
                                <button onClick={() => setView('create')} className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-md uppercase text-xs tracking-widest">+ Nova Ordem de Serviço</button>
                                {orders.map(o => (
                                    <div key={o.id} onClick={() => { setSelectedOrder(o); setView('detail'); }} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center">
                                        <div>
                                            <div className="text-blue-600 font-bold text-[10px]">OS #{o.osNumber}</div>
                                            <div className="font-bold text-slate-800 uppercase text-sm">{o.client}</div>
                                            <div className="text-[10px] text-slate-400 mt-1 uppercase font-semibold">{o.photos?.length || 0} fotos</div>
                                        </div>
                                        <div className="text-slate-300"><IconBack /></div>
                                    </div>
                                ))}
                            </div>
                        ) : view === 'create' ? (
                            <form className="bg-white p-6 rounded-xl shadow-md space-y-4" onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                await addDoc(collection(db, 'orders'), {
                                    osNumber: fd.get('os'), client: fd.get('client'),
                                    serviceNotes: "", createdAt: new Date().toISOString(), photos: []
                                });
                                setView('list');
                            }}>
                                <h2 className="text-lg font-bold">Nova O.S.</h2>
                                <input name="os" placeholder="Número da O.S." className="w-full border p-3 rounded-lg bg-slate-50 outline-none" required />
                                <input name="client" placeholder="Cliente / Veículo" className="w-full border p-3 rounded-lg bg-slate-50 outline-none" required />
                                <button className="w-full bg-slate-900 text-white p-4 rounded-xl font-bold uppercase text-xs tracking-widest text-center">Abrir OS</button>
                            </form>
                        ) : (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-600 flex justify-between items-start">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-800 uppercase">{selectedOrder.client}</h2>
                                        <p className="text-blue-600 font-bold text-xs mt-1">Nº {selectedOrder.osNumber}</p>
                                    </div>
                                    <button onClick={() => deleteOrder(selectedOrder.id)} className="text-slate-300 p-2 hover:text-red-500"><IconTrash /></button>
                                </div>

                                <div className="bg-white p-4 rounded-xl shadow-sm space-y-2 border border-slate-100">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Descrição do Serviço</label>
                                    <textarea 
                                        className="w-full border-0 bg-slate-50 p-3 rounded-lg text-sm outline-none min-h-[100px] font-medium"
                                        placeholder="O que foi feito no carro?"
                                        value={selectedOrder.serviceNotes || ""}
                                        onChange={(e) => updateOrderField("serviceNotes", e.target.value)}
                                    />
                                </div>

                                <div className="flex justify-between items-center bg-slate-200 p-2 rounded-xl sticky top-16 z-40">
                                    <div className="flex gap-1">
                                        <button 
                                            disabled={isUploading} 
                                            onClick={() => fileInputRef.current.click()} 
                                            className="bg-blue-600 text-white px-3 py-2 rounded-lg font-bold text-[9px] flex items-center gap-1 uppercase tracking-tighter"
                                        >
                                            <IconPlus /> {isUploading ? "ENVIANDO" : "FOTO"}
                                        </button>
                                        {selectedOrder.photos?.length > 0 && (
                                            <button 
                                                onClick={downloadAllPhotos}
                                                className="bg-slate-700 text-white px-3 py-2 rounded-lg font-bold text-[9px] flex items-center gap-1 uppercase tracking-tighter"
                                            >
                                                <IconDownload /> BAIXAR TUDO
                                            </button>
                                        )}
                                    </div>
                                    <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleUpload} />
                                </div>

                                <div className="grid gap-4">
                                    {selectedOrder.photos?.map(p => (
                                        <div key={p.id} className="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100 relative group">
                                            <img src={p.url} className="w-full h-auto bg-slate-200" loading="lazy" />
                                            
                                            <div className="p-3 flex items-center gap-2">
                                                <input 
                                                    className="w-full text-xs font-bold text-slate-600 outline-none"
                                                    placeholder="Legenda da foto..."
                                                    value={p.description || ""}
                                                    onChange={(e) => {
                                                        const up = selectedOrder.photos.map(ph => ph.id === p.id ? {...ph, description: e.target.value} : ph);
                                                        updateDoc(doc(db, 'orders', selectedOrder.id), { photos: up });
                                                    }}
                                                />
                                                <div className="flex gap-2">
                                                    <a href={p.url} download={`OS-${selectedOrder.osNumber}.jpg`} className="text-blue-500 p-1"><IconDownload /></a>
                                                    <button onClick={() => deletePhoto(p.id)} className="text-red-400 p-1"><IconTrash /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
