<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        // Inicializando o Firebase (Formato Global)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Ícones SVG
        const IconWrench = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>;
        const IconEdit = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconTrash = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconDownload = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconBack = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const IconSearch = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [view, setView] = useState('list');
            const [isUploading, setIsUploading] = useState(false);
            const [isEditingHeader, setIsEditingHeader] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const unsubscribe = firebase.auth().onAuthStateChanged((u) => {
                    if (!u) firebase.auth().signInAnonymously().catch(console.error);
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                // Ajustado para sintaxe compat (db.collection)
                return db.collection('orders').onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    const sorted = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    setOrders(sorted);
                    if (selectedOrder) {
                        const up = sorted.find(o => o.id === selectedOrder.id);
                        if (up) setSelectedOrder(up);
                    }
                });
            }, [user, selectedOrder?.id]);

            const filteredOrders = useMemo(() => {
                const term = searchTerm.toLowerCase();
                return orders.filter(o => 
                    (o.osNumber && o.osNumber.toString().toLowerCase().includes(term)) ||
                    (o.materials && o.materials.toLowerCase().includes(term)) ||
                    (o.client && o.client.toLowerCase().includes(term))
                );
            }, [orders, searchTerm]);

            const updateOrderField = async (field, value) => {
                if (!selectedOrder) return;
                try {
                    await db.collection('orders').doc(selectedOrder.id).update({ [field]: value });
                } catch (e) { console.error(e); }
            };

            const handleUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length || !selectedOrder) return;
                setIsUploading(true);
                try {
                    const orderRef = db.collection('orders').doc(selectedOrder.id);
                    const newPhotos = [];
                    for (const file of files) {
                        const compressed = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.readAsDataURL(file);
                            reader.onload = (ev) => {
                                const img = new Image();
                                img.src = ev.target.result;
                                img.onload = () => {
                                    const canvas = document.createElement('canvas');
                                    const MAX = 600;
                                    let w = img.width, h = img.height;
                                    if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                                    else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                                    canvas.width = w; canvas.height = h;
                                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                                };
                            };
                        });
                        newPhotos.push({ id: Math.random().toString(36).substr(2, 9), url: compressed, description: "" });
                    }
                    const docSnap = await orderRef.get();
                    const currentPhotos = docSnap.exists ? (docSnap.data().photos || []) : [];
                    await orderRef.update({ photos: [...currentPhotos, ...newPhotos] });
                } catch (err) { alert("Erro no upload."); }
                finally { 
                    setIsUploading(false); 
                    if (fileInputRef.current) fileInputRef.current.value = "";
                }
            };

            if (!user) return <div className="h-screen flex items-center justify-center font-bold text-blue-600 uppercase text-[10px] tracking-widest">Iniciando...</div>;

            return (
                <div className="min-h-screen pb-10 bg-gray-50">
                    {/* ... O RESTO DO SEU JSX PERMANECE IGUAL ... */}
                    {/* Como o código é grande, garanta apenas que dentro do seu JSX, 
                        onde você chama addDoc, você troque para: 
                        db.collection('orders').add({...}) 
                    */}
                    {/* ... */}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
