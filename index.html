<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [view, setView] = useState('list');
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (!u) signInAnonymously(auth).catch(console.error);
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'orders');
                return onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setOrders(data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                    if (selectedOrder) {
                        const updated = data.find(o => o.id === selectedOrder.id);
                        if (updated) setSelectedOrder(updated);
                    }
                });
            }, [user, selectedOrder?.id]);

            const updateOrderField = async (field, value) => {
                const orderRef = doc(db, 'orders', selectedOrder.id);
                await updateDoc(orderRef, { [field]: value });
            };

            const updatePhotoDesc = async (photoId, text) => {
                const updatedPhotos = selectedOrder.photos.map(p => 
                    p.id === photoId ? { ...p, description: text } : p
                );
                const orderRef = doc(db, 'orders', selectedOrder.id);
                await updateDoc(orderRef, { photos: updatedPhotos });
            };

            const compressAndUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                setIsUploading(true);
                const newPhotos = [];

                for (const file of files) {
                    const base64 = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result);
                        reader.readAsDataURL(file);
                    });
                    
                    const img = new Image();
                    img.src = base64;
                    const compressed = await new Promise(r => {
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const max = 800;
                            let w = img.width, h = img.height;
                            if (w > h) { if (w > max) { h *= max / w; w = max; } }
                            else { if (h > max) { w *= max / h; h = max; } }
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            r(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    });
                    newPhotos.push({ id: Math.random().toString(36), url: compressed, description: "" });
                }

                const orderRef = doc(db, 'orders', selectedOrder.id);
                await updateDoc(orderRef, { photos: [...(selectedOrder.photos || []), ...newPhotos] });
                setIsUploading(false);
            };

            if (!user) return <div className="h-screen flex items-center justify-center font-bold">Iniciando sistema...</div>;

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-800 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-bold flex items-center gap-2"><i data-lucide="wrench"></i> OS OFICINA</h1>
                        {view !== 'list' && <button onClick={() => setView('list')} className="p-2 bg-slate-700 rounded-full"><i data-lucide="arrow-left"></i></button>}
                    </header>

                    <main className="p-4 max-w-xl mx-auto">
                        {view === 'list' ? (
                            <div className="space-y-4">
                                <button onClick={() => setView('create')} className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg">Abrir Nova O.S.</button>
                                {orders.map(o => (
                                    <div key={o.id} onClick={() => { setSelectedOrder(o); setView('detail'); }} className="bg-white p-4 rounded-xl shadow border border-gray-200">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <div className="text-blue-600 font-black text-xs">#{o.osNumber}</div>
                                                <div className="text-lg font-bold text-gray-800">{o.client}</div>
                                            </div>
                                            <div className="text-[10px] text-gray-400">{new Date(o.createdAt).toLocaleDateString()}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : view === 'create' ? (
                            <form className="bg-white p-6 rounded-xl shadow-lg space-y-4" onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                await addDoc(collection(db, 'orders'), {
                                    osNumber: fd.get('os'), client: fd.get('client'),
                                    serviceNotes: "", createdAt: new Date().toISOString(), photos: []
                                });
                                setView('list');
                            }}>
                                <h2 className="text-xl font-bold text-center">Cadastro de O.S.</h2>
                                <input name="os" placeholder="Nº da O.S." className="w-full border p-3 rounded-lg" required />
                                <input name="client" placeholder="Nome do Cliente" className="w-full border p-3 rounded-lg" required />
                                <button className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Criar</button>
                            </form>
                        ) : (
                            <div className="space-y-6">
                                <div className="bg-white p-4 rounded-xl shadow border-l-8 border-blue-600">
                                    <h2 className="text-2xl font-bold">{selectedOrder.client}</h2>
                                    <p className="text-gray-500 font-bold">O.S. #{selectedOrder.osNumber}</p>
                                </div>

                                <div className="bg-white p-4 rounded-xl shadow space-y-2">
                                    <label className="text-xs font-black text-gray-400 uppercase">Descrição Geral do Serviço</label>
                                    <textarea 
                                        className="w-full border-0 bg-gray-50 p-3 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none min-h-[100px]"
                                        placeholder="Digite aqui o que foi feito no veículo..."
                                        value={selectedOrder.serviceNotes || ""}
                                        onChange={(e) => updateOrderField("serviceNotes", e.target.value)}
                                    />
                                </div>

                                <div className="flex justify-between items-center">
                                    <h3 className="font-bold flex items-center gap-2"><i data-lucide="camera"></i> Fotos do Serviço</h3>
                                    <button disabled={isUploading} onClick={() => fileInputRef.current.click()} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow flex items-center gap-2">
                                        {isUploading ? "..." : <i data-lucide="plus" size="16"></i>} Anexar
                                    </button>
                                    <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={compressAndUpload} />
                                </div>

                                <div className="grid gap-6">
                                    {selectedOrder.photos?.map(p => (
                                        <div key={p.id} className="bg-white rounded-2xl overflow-hidden shadow-md border border-gray-100">
                                            <img src={p.url} className="w-full h-auto bg-black" />
                                            <div className="p-3 space-y-2">
                                                <input 
                                                    className="w-full text-sm border-b border-gray-100 focus:border-blue-500 outline-none p-1"
                                                    placeholder="Legenda da foto (ex: Peça trocada)"
                                                    value={p.description || ""}
                                                    onChange={(e) => updatePhotoDesc(p.id, e.target.value)}
                                                />
                                                <div className="text-right">
                                                    <a href={p.url} download className="text-[10px] font-black text-blue-600">BAIXAR ORIGINAL</a>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
