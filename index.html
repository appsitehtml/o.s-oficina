<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Componente simples de App
        function App() {
            const [user, setUser] = useState(null);
            const [status, setStatus] = useState("Carregando...");

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (!u) {
                        auth.signInAnonymously().catch((e) => {
                            console.error(e);
                            setStatus("Erro ao conectar.");
                        });
                    } else {
                        setUser(u);
                    }
                });
                return () => unsubscribe();
            }, []);

            if (!user) {
                return <div className="p-10 text-center">{status}</div>;
            }

            return (
                <div className="p-10 text-center">
                    <h1 className="text-2xl font-bold">Sistema Conectado!</h1>
                    <p>Usuário autenticado: {user.uid}</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
