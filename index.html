<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Evita que o navegador tente renderizar tudo de uma vez e trave */
        img { content-visibility: auto; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [view, setView] = useState('list');
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (!u) signInAnonymously(auth).catch(console.error);
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                return onSnapshot(collection(db, 'orders'), (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    const sorted = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    setOrders(sorted);
                    if (selectedOrder) {
                        const up = sorted.find(o => o.id === selectedOrder.id);
                        if (up) setSelectedOrder(up);
                    }
                });
            }, [user, selectedOrder?.id]);

            const updateOrderField = async (field, value) => {
                try {
                    await updateDoc(doc(db, 'orders', selectedOrder.id), { [field]: value });
                } catch (e) { console.error(e); }
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600; // Reduzido para evitar tela branca
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_WIDTH) {
                                    height *= MAX_WIDTH / width;
                                    width = MAX_WIDTH;
                                }
                            } else {
                                if (height > MAX_WIDTH) {
                                    width *= MAX_WIDTH / height;
                                    height = MAX_WIDTH;
                                }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.5));
                        };
                    };
                });
            };

            const handleUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                
                setIsUploading(true);
                try {
                    const orderRef = doc(db, 'orders', selectedOrder.id);
                    const newPhotos = [];

                    for (const file of files) {
                        const compressed = await compressImage(file);
                        newPhotos.push({
                            id: Math.random().toString(36).substr(2, 9),
                            url: compressed,
                            description: ""
                        });
                    }

                    const docSnap = await getDoc(orderRef);
                    const currentPhotos = docSnap.exists() ? (docSnap.data().photos || []) : [];
                    await updateDoc(orderRef, { photos: [...currentPhotos, ...newPhotos] });
                } catch (err) {
                    alert("Erro ao salvar. Tente uma foto por vez.");
                } finally {
                    setIsUploading(false);
                    if (fileInputRef.current) fileInputRef.current.value = "";
                }
            };

            if (!user) return <div className="h-screen flex items-center justify-center font-bold text-blue-600 uppercase tracking-widest text-xs animate-pulse">Carregando Oficina...</div>;

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-bold flex items-center gap-2 text-sm tracking-tight"><i data-lucide="wrench" className="text-blue-400"></i> OFICINA DIGITAL</h1>
                        {view !== 'list' && (
                            <button onClick={() => setView('list')} className="p-2 bg-slate-800 rounded-lg active:scale-90 transition-transform">
                                <i data-lucide="chevron-left" size="20"></i>
                            </button>
                        )}
                    </header>

                    <main className="p-4 max-w-xl mx-auto">
                        {view === 'list' ? (
                            <div className="space-y-3">
                                <button onClick={() => setView('create')} className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-md active:bg-blue-700 transition-colors uppercase text-xs tracking-widest">
                                    + Nova Ordem de Serviço
                                </button>
                                {orders.map(o => (
                                    <div key={o.id} onClick={() => { setSelectedOrder(o); setView('detail'); }} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm active:bg-slate-50 flex justify-between items-center">
                                        <div>
                                            <div className="text-blue-600 font-bold text-[10px]">OS #{o.osNumber}</div>
                                            <div className="font-bold text-slate-800 uppercase text-sm">{o.client}</div>
                                            <div className="text-[10px] text-slate-400 mt-1 uppercase font-semibold">{o.photos?.length || 0} fotos salvas</div>
                                        </div>
                                        <i data-lucide="chevron-right" className="text-slate-300" size="18"></i>
                                    </div>
                                ))}
                            </div>
                        ) : view === 'create' ? (
                            <form className="bg-white p-6 rounded-xl shadow-md space-y-4" onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                await addDoc(collection(db, 'orders'), {
                                    osNumber: fd.get('os'), client: fd.get('client'),
                                    serviceNotes: "", createdAt: new Date().toISOString(), photos: []
                                });
                                setView('list');
                            }}>
                                <h2 className="text-lg font-bold text-slate-800">Nova O.S.</h2>
                                <input name="os" placeholder="Número da O.S." className="w-full border p-3 rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 font-bold" required />
                                <input name="client" placeholder="Nome do Cliente / Veículo" className="w-full border p-3 rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 font-bold" required />
                                <button className="w-full bg-slate-900 text-white p-4 rounded-xl font-bold uppercase text-xs tracking-widest">Salvar no Banco de Dados</button>
                            </form>
                        ) : (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-600 flex justify-between items-start">
                                    <div>
                                        <h2 className="text-xl font-bold text-slate-800 uppercase leading-none">{selectedOrder.client}</h2>
                                        <p className="text-blue-600 font-bold text-xs mt-1">Nº {selectedOrder.osNumber}</p>
                                    </div>
                                    <button onClick={() => { if(confirm("Apagar O.S.?")) deleteDoc(doc(db, 'orders', selectedOrder.id)); }} className="text-slate-300 active:text-red-600 p-1"><i data-lucide="trash-2" size="18"></i></button>
                                </div>

                                <div className="bg-white p-4 rounded-xl shadow-sm space-y-2 border border-slate-100">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Descrição do Serviço</label>
                                    <textarea 
                                        className="w-full border-0 bg-slate-50 p-3 rounded-lg text-sm focus:ring-2 focus:ring-blue-100 outline-none min-h-[100px] font-medium"
                                        placeholder="O que foi feito no carro?"
                                        value={selectedOrder.serviceNotes || ""}
                                        onChange={(e) => updateOrderField("serviceNotes", e.target.value)}
                                    />
                                </div>

                                <div className="flex justify-between items-center bg-slate-100 p-2 rounded-xl">
                                    <h3 className="font-bold text-slate-600 text-xs uppercase px-2">Galeria de Fotos</h3>
                                    <button 
                                        disabled={isUploading} 
                                        onClick={() => fileInputRef.current.click()} 
                                        className={`px-4 py-2 rounded-lg font-bold text-[10px] shadow-sm flex items-center gap-2 ${isUploading ? 'bg-slate-400 text-white' : 'bg-blue-600 text-white active:scale-95'}`}
                                    >
                                        {isUploading ? "..." : <i data-lucide="camera" size="14"></i>}
                                        {isUploading ? "PROCESSANDO" : "FOTO"}
                                    </button>
                                    <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={handleUpload} />
                                </div>

                                <div className="grid gap-4">
                                    {selectedOrder.photos?.map(p => (
                                        <div key={p.id} className="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-100">
                                            <img src={p.url} className="w-full h-auto bg-slate-200" loading="lazy" />
                                            <div className="p-3">
                                                <input 
                                                    className="w-full text-xs font-bold text-slate-600 outline-none border-b border-transparent focus:border-blue-200 py-1"
                                                    placeholder="Legenda da foto..."
                                                    value={p.description || ""}
                                                    onChange={(e) => {
                                                        const up = selectedOrder.photos.map(ph => ph.id === p.id ? {...ph, description: e.target.value} : ph);
                                                        updateDoc(doc(db, 'orders', selectedOrder.id), { photos: up });
                                                    }}
                                                />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
