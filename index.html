<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema O.S. Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Importação dos módulos Firebase via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- SUBSTITUA PELOS SEUS DADOS DO FIREBASE AQUI ---
        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket:  "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };
        // -------------------------------------------------

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'os-photo-shared-v1';

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [view, setView] = useState('list');
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            // Ícones Lucide (Fix para carregar no React via CDN)
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            useEffect(() => {
                onAuthStateChanged(auth, (u) => {
                    if (!u) signInAnonymously(auth);
                    setUser(u);
                });
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'orders');
                return onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setOrders(data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)));
                    if (selectedOrder) {
                        const updated = data.find(o => o.id === selectedOrder.id);
                        if (updated) setSelectedOrder(updated);
                    }
                });
            }, [user, selectedOrder?.id]);

            const compressAndUpload = async (e) => {
                const files = Array.from(e.target.files);
                setIsUploading(true);
                const newPhotos = [];

                for (const file of files) {
                    const base64 = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result);
                        reader.readAsDataURL(file);
                    });
                    
                    // Compressão simples via Canvas
                    const img = new Image();
                    img.src = base64;
                    const compressed = await new Promise(r => {
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const scale = 800 / Math.max(img.width, img.height);
                            canvas.width = img.width * scale;
                            canvas.height = img.height * scale;
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            r(canvas.toDataURL('image/jpeg', 0.7));
                        };
                    });

                    newPhotos.push({ id: Date.now() + Math.random(), url: compressed, createdAt: new Date().toISOString() });
                }

                const orderRef = doc(db, 'orders', selectedOrder.id);
                await updateDoc(orderRef, { photos: [...(selectedOrder.photos || []), ...newPhotos] });
                setIsUploading(false);
            };

            return (
                <div className="min-h-screen">
                    <header className="bg-blue-600 text-white p-4 shadow flex justify-between items-center">
                        <h1 className="font-bold flex items-center gap-2"><i data-lucide="folder"></i> OS Cloud</h1>
                        {view !== 'list' && <button onClick={() => setView('list')}><i data-lucide="arrow-left"></i></button>}
                    </header>

                    <main className="p-4 max-w-xl mx-auto">
                        {view === 'list' ? (
                            <div className="space-y-4">
                                <button onClick={() => setView('create')} className="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Nova Ordem de Serviço</button>
                                {orders.map(o => (
                                    <div key={o.id} onClick={() => { setSelectedOrder(o); setView('detail'); }} className="bg-white p-4 rounded-lg shadow border">
                                        <div className="text-blue-600 font-bold">#{o.osNumber}</div>
                                        <div className="text-lg font-medium">{o.client}</div>
                                        <div className="text-sm text-gray-400">{o.photos?.length || 0} fotos</div>
                                    </div>
                                ))}
                            </div>
                        ) : view === 'create' ? (
                            <form className="bg-white p-4 rounded shadow space-y-4" onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                await addDoc(collection(db, 'orders'), {
                                    osNumber: fd.get('os'), client: fd.get('client'),
                                    createdAt: new Date().toISOString(), photos: []
                                });
                                setView('list');
                            }}>
                                <input name="os" placeholder="Nº da OS" className="w-full border p-2 rounded" required />
                                <input name="client" placeholder="Cliente" className="w-full border p-2 rounded" required />
                                <button className="w-full bg-blue-600 text-white p-2 rounded">Criar Pasta</button>
                            </form>
                        ) : (
                            <div className="space-y-4">
                                <div className="bg-white p-4 rounded shadow border-l-4 border-blue-500">
                                    <h2 className="text-xl font-bold">{selectedOrder.client}</h2>
                                    <p>OS: {selectedOrder.osNumber}</p>
                                </div>
                                <button disabled={isUploading} onClick={() => fileInputRef.current.click()} className="w-full bg-blue-500 text-white p-3 rounded flex justify-center gap-2">
                                    {isUploading ? "Enviando..." : <><i data-lucide="camera"></i> Adicionar Fotos</>}
                                </button>
                                <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={compressAndUpload} />
                                <div className="grid gap-4">
                                    {selectedOrder.photos?.map(p => (
                                        <div key={p.id} className="bg-white rounded overflow-hidden shadow">
                                            <img src={p.url} className="w-full h-48 object-cover" />
                                            <div className="p-2 text-right">
                                                <a href={p.url} download={`foto-${p.id}.jpg`} className="text-blue-600 text-xs font-bold">Download</a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
