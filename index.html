<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        // Usamos as variáveis globais que os scripts carregaram acima.
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        // Inicializar Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const [status, setStatus] = useState("Conectando...");

            useEffect(() => {
                auth.signInAnonymously()
                    .then(() => setStatus("Sistema Online - Pronto para uso"))
                    .catch((err) => {
                        console.error(err);
                        setStatus("Erro ao conectar.");
                    });
            }, []);

            return (
                <div className="flex justify-center items-center h-screen bg-gray-100">
                    <div className="bg-white p-10 rounded-2xl shadow-xl text-center">
                        <h1 className="text-2xl font-bold text-blue-600 mb-4">O.S. Oficina</h1>
                        <p className="text-gray-600">{status}</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
