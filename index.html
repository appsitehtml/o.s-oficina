<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script>
        // 1. Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. Componente React (Sem JSX / Sem Babel)
        function App() {
            const [osList, setOsList] = React.useState([]);

            React.useEffect(() => {
                db.collection("os").onSnapshot((snapshot) => {
                    const dados = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setOsList(dados);
                });
            }, []);

            // Criando elementos sem o formato <div /> (isso é React puro)
            return React.createElement('div', { className: 'p-6 max-w-4xl mx-auto' },
                React.createElement('h1', { className: 'text-3xl font-bold text-gray-800 mb-6' }, 'Sistema Oficina'),
                React.createElement('div', { className: 'bg-white p-6 rounded-lg shadow-md' },
                    React.createElement('h2', { className: 'text-xl font-semibold mb-4' }, 'Listagem de O.S.'),
                    osList.length === 0 
                        ? React.createElement('p', { className: 'text-gray-500' }, 'Nenhuma O.S. cadastrada ainda.')
                        : React.createElement('ul', { className: 'divide-y divide-gray-200' },
                            osList.map(os => 
                                React.createElement('li', { key: os.id, className: 'py-4' }, 
                                    os.cliente || "Sem nome"
                                )
                            )
                        )
                )
            );
        }

        // 3. Renderização
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
