<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema O.S. Oficina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        // Importação dos módulos Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURAÇÃO DO SEU FIREBASE (OS-OFICINA)
        const firebaseConfig = {
            apiKey: "AIzaSyAqGohWqv5OIWVzSlwtBtoRSOpVzut5Cuc",
            authDomain: "os-oficina-c3518.firebaseapp.com",
            projectId: "os-oficina-c3518",
            storageBucket: "os-oficina-c3518.firebasestorage.app",
            messagingSenderId: "294943712762",
            appId: "1:294943712762:web:c8cd4f38ef363020eab043"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [view, setView] = useState('list');
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    if (!u) signInAnonymously(auth).catch(e => console.error("Erro Auth:", e));
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'orders');
                return onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    const sorted = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                    setOrders(sorted);
                    if (selectedOrder) {
                        const updated = sorted.find(o => o.id === selectedOrder.id);
                        if (updated) setSelectedOrder(updated);
                    }
                });
            }, [user, selectedOrder?.id]);

            const compressAndUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                setIsUploading(true);
                const newPhotos = [];

                for (const file of files) {
                    const base64 = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result);
                        reader.readAsDataURL(file);
                    });
                    
                    const img = new Image();
                    img.src = base64;
                    const compressed = await new Promise(r => {
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const max = 800;
                            let w = img.width, h = img.height;
                            if (w > h) { if (w > max) { h *= max / w; w = max; } }
                            else { if (h > max) { w *= max / h; h = max; } }
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            r(canvas.toDataURL('image/jpeg', 0.7));
                        };
                    });
                    newPhotos.push({ id: Date.now() + Math.random(), url: compressed });
                }

                try {
                    const orderRef = doc(db, 'orders', selectedOrder.id);
                    await updateDoc(orderRef, { photos: [...(selectedOrder.photos || []), ...newPhotos] });
                } catch (err) {
                    console.error("Erro ao salvar:", err);
                    alert("Erro ao salvar fotos. Verifique as 'Rules' no console do Firebase.");
                }
                setIsUploading(false);
            };

            if (!user) return <div className="h-screen flex items-center justify-center font-bold">Conectando à nuvem da oficina...</div>;

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-blue-600 text-white p-4 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-bold flex items-center gap-2"><i data-lucide="wrench"></i> O.S. OFICINA</h1>
                        {view !== 'list' && (
                            <button onClick={() => setView('list')} className="p-2 bg-blue-700 rounded-full">
                                <i data-lucide="arrow-left"></i>
                            </button>
                        )}
                    </header>

                    <main className="p-4 max-w-xl mx-auto">
                        {view === 'list' ? (
                            <div className="space-y-4">
                                <button onClick={() => setView('create')} className="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg">Nova Pasta de Serviço</button>
                                {orders.length === 0 && <div className="text-center py-10 text-gray-400">Nenhuma OS criada ainda.</div>}
                                {orders.map(o => (
                                    <div key={o.id} onClick={() => { setSelectedOrder(o); setView('detail'); }} className="bg-white p-4 rounded-xl shadow border hover:border-blue-400 transition-colors">
                                        <div className="text-blue-600 font-black text-xs uppercase">#{o.osNumber}</div>
                                        <div className="text-lg font-bold">{o.client}</div>
                                        <div className="text-xs text-gray-400 mt-1 flex items-center gap-1"><i data-lucide="image" size="12"></i> {o.photos?.length || 0} fotos</div>
                                    </div>
                                ))}
                            </div>
                        ) : view === 'create' ? (
                            <form className="bg-white p-6 rounded-xl shadow-lg space-y-4" onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                await addDoc(collection(db, 'orders'), {
                                    osNumber: fd.get('os'), client: fd.get('client'),
                                    createdAt: new Date().toISOString(), photos: []
                                });
                                setView('list');
                            }}>
                                <h2 className="text-xl font-bold text-center mb-4">Abrir Nova OS</h2>
                                <input name="os" placeholder="Nº da Ordem de Serviço" className="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required />
                                <input name="client" placeholder="Nome do Cliente" className="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" required />
                                <button className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-md">Criar Agora</button>
                            </form>
                        ) : (
                            <div className="space-y-6">
                                <div className="bg-white p-4 rounded-xl shadow border-l-8 border-blue-500">
                                    <h2 className="text-2xl font-bold">{selectedOrder.client}</h2>
                                    <p className="text-gray-500">Documento: OS-{selectedOrder.osNumber}</p>
                                </div>
                                <button disabled={isUploading} onClick={() => fileInputRef.current.click()} className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold flex justify-center items-center gap-2 shadow-lg active:scale-95 transition-all">
                                    {isUploading ? <span className="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span> : <i data-lucide="camera"></i>}
                                    {isUploading ? "Processando..." : "Anexar Fotos do Serviço"}
                                </button>
                                <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={compressAndUpload} />
                                <div className="grid gap-6">
                                    {selectedOrder.photos?.map(p => (
                                        <div key={p.id} className="bg-white rounded-2xl overflow-hidden shadow-md border border-gray-100">
                                            <img src={p.url} className="w-full h-auto bg-black" />
                                            <div className="p-3 text-right bg-white">
                                                <a href={p.url} download={`OS-${selectedOrder.osNumber}.jpg`} className="text-blue-600 text-xs font-black flex items-center justify-end gap-1"><i data-lucide="download" size="14"></i> DOWNLOAD</a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
